<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form | Yardland International School</title>
    <meta name="description" content="Apply for admission at Yardland International School, Chitrakoot. Online admission form for session 2026-27.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-title {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }
        .form-title span {
            color: #c62828;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group label i {
            color: #c62828;
            margin-right: 8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c62828;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .required {
            color: #c62828;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }
        .submit-btn i {
            font-size: 1.3rem;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .info-box {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 25px;
        }
        .info-box p {
            color: #e65100;
            font-size: 0.9rem;
            margin: 0;
        }
        .school-info {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .school-info p {
            color: #666;
            font-size: 0.9rem;
            margin: 5px 0;
        }
        .school-info a {
            color: #c62828;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 Yardland International School</h1>
            <p>Chitrakoot | Admission Form 2026-27</p>
        </div>
        
        <div class="form-card">
            <h2 class="form-title">📝 <span>प्रवेश फॉर्म</span></h2>
            
            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> फॉर्म भरने के बाद WhatsApp पर जानकारी भेजी जाएगी। हम जल्द संपर्क करेंगे।</p>
            </div>
            
            <form id="admissionForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i>छात्र का नाम <span class="required">*</span></label>
                    <input type="text" id="studentName" placeholder="Student Name" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user-tie"></i>पिता का नाम <span class="required">*</span></label>
                    <input type="text" id="fatherName" placeholder="Father's Name" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user-friends"></i>माता का नाम</label>
                    <input type="text" id="motherName" placeholder="Mother's Name">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i>जन्म तिथि <span class="required">*</span></label>
                    <input type="date" id="dob" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-graduation-cap"></i>कक्षा (Admission for Class) <span class="required">*</span></label>
                    <select id="classFor" required>
                        <option value="">-- कक्षा चुनें --</option>
                        <option value="Play Group">Play Group</option>
                        <option value="Nursery">Nursery</option>
                        <option value="LKG">LKG</option>
                        <option value="UKG">UKG</option>
                        <option value="Class 1">Class 1</option>
                        <option value="Class 2">Class 2</option>
                        <option value="Class 3">Class 3</option>
                        <option value="Class 4">Class 4</option>
                        <option value="Class 5">Class 5</option>
                        <option value="Class 6">Class 6</option>
                        <option value="Class 7">Class 7</option>
                        <option value="Class 8">Class 8</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-phone"></i>मोबाइल नंबर <span class="required">*</span></label>
                    <input type="tel" id="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fab fa-whatsapp"></i>WhatsApp नंबर</label>
                    <input type="tel" id="whatsapp" placeholder="WhatsApp Number (if different)">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i>पता (Address) <span class="required">*</span></label>
                    <textarea id="address" placeholder="Full Address" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fab fa-whatsapp"></i>
                    Submit via WhatsApp
                </button>
            </form>
            
            <div class="school-info">
                <p><i class="fas fa-phone"></i> <a href="tel:7007178637">7007178637</a></p>
                <p><i class="fas fa-envelope"></i> <a href="mailto:yardland9936@gmail.com">yardland9936@gmail.com</a></p>
                <p><i class="fas fa-map-marker-alt"></i> Chitra Gokulpur, UP-MP Border, Chitrakoot</p>
            </div>
        </div>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
    
    <script>
        document.getElementById('admissionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const studentName = document.getElementById('studentName').value;
            const fatherName = document.getElementById('fatherName').value;
            const motherName = document.getElementById('motherName').value || 'N/A';
            const dob = document.getElementById('dob').value;
            const classFor = document.getElementById('classFor').value;
            const mobile = document.getElementById('mobile').value;
            const whatsapp = document.getElementById('whatsapp').value || mobile;
            const address = document.getElementById('address').value;
            
            const message = `🏫 *YARDLAND INTERNATIONAL SCHOOL*
📝 *NEW ADMISSION ENQUIRY*
━━━━━━━━━━━━━━━━━━

👤 *Student Name:* ${studentName}
👨 *Father's Name:* ${fatherName}
👩 *Mother's Name:* ${motherName}
📅 *Date of Birth:* ${dob}
🎓 *Class for Admission:* ${classFor}
📱 *Mobile:* ${mobile}
💬 *WhatsApp:* ${whatsapp}
🏠 *Address:* ${address}

━━━━━━━━━━━━━━━━━━
📲 Submitted via Website`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappURL = `https://wa.me/917007178637?text=${encodedMessage}`;
            
            window.open(whatsappURL, '_blank');
        });
    </script>
</body>
</html>
